<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Подтверждение активации</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fb;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.08);
      padding: 24px;
      text-align: center;
    }
    .box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }
    .error {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #be123c;
      display: none;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Подтверждение активации</h1>
    <div id="status" class="box">Подтверждаем активацию...</div>
    <div id="error" class="error"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    function getSessionId() {
      const parts = window.location.pathname.split('/');
      return parts[parts.length - 1] || '';
    }

    async function readJsonSafe(response) {
      const text = await response.text();
      try {
        return text ? JSON.parse(text) : {};
      } catch {
        throw new Error(text || 'Некорректный ответ сервера');
      }
    }

    async function confirmActivation() {
      try {
        const sessionId = getSessionId();
        const response = await fetch(`/happ/api/redeem-confirm/${sessionId}`, {
          method: 'POST',
          headers: { 'Accept': 'application/json' }
        });

        const data = await readJsonSafe(response);

        if (!response.ok || !data.ok) {
          throw new Error(data.error || 'Не удалось подтвердить активацию');
        }

        statusEl.textContent = `Активация подтверждена. Осталось: ${data.remaining}`;
      } catch (e) {
        errorEl.style.display = 'block';
        errorEl.textContent = e.message || 'Ошибка подтверждения';
        statusEl.textContent = 'Подтверждение не выполнено';
      }
    }

    confirmActivation();
  </script>
</body>
</html>
